<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBOSTGY | Science • AI • Mysteries</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter, sans-serif;
background:radial-gradient(circle at top,#0b1020,#02030a 70%);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
width:360px;
padding:40px 30px;
border-radius:24px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
text-align:center;
box-shadow:0 0 40px rgba(0,255,255,0.15);
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #22d3ee;
margin-bottom:15px;
box-shadow:0 0 20px rgba(34,211,238,0.6);
}

h1{
font-family:Orbitron, sans-serif;
margin:8px 0;
font-size:22px;
letter-spacing:1px;
}

.bio{
font-size:13px;
opacity:0.8;
margin-bottom:25px;
line-height:1.4;
}

.link{
display:block;
text-decoration:none;
color:white;
padding:12px;
margin:10px 0;
border-radius:12px;
font-weight:600;
background:linear-gradient(135deg,#06b6d4,#6366f1);
transition:all .25s ease;
}

.link:hover{
transform:scale(1.06);
box-shadow:0 0 18px #22d3ee;
}

.video{
margin-top:25px;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,255,255,0.2);
}

iframe{
width:100%;
height:200px;
border:none;
}

.counter{
margin-top:15px;
font-size:13px;
opacity:.8;
}

.footer{
margin-top:18px;
font-size:11px;
opacity:.6;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<img class="profile" src="bostgu.jpg" alt="ALBOSTGY">

<h1>ALBOSTGY</h1>

<div class="bio">
Exploring Science, Artificial Intelligence, Technology
and mysterious phenomena of the universe.
</div>

<a class="link" href="https://www.youtube.com/@ALBOSTGY" target="_blank">YouTube</a>
<a class="link" href="https://www.facebook.com/ALBOSTGY24" target="_blank">Facebook</a>
<a class="link" href="https://www.instagram.com/albostgy/" target="_blank">Instagram</a>
<a class="link" href="https://www.threads.com/@albostgy" target="_blank">Threads</a>

<div class="video">
<iframe src="https://www.youtube.com/embed?listType=user_uploads&list=ALBOSTGY"></iframe>
</div>

<div class="counter" id="subCounter">YouTube Channel: @ALBOSTGY</div>

<div class="footer">Stay Curious • Question Everything</div>

</div>

<script>

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4
})
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

particles.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y-=p.speed

if(p.y<0){
p.y=canvas.height
p.x=Math.random()*canvas.width
}
})

requestAnimationFrame(animate)
}

animate()

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
})

</script>

</body>
</html>
